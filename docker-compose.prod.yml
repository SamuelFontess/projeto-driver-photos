services:
  # ─── Banco de dados ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: driver_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-driver}
      POSTGRES_USER: ${POSTGRES_USER:-driver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - driver_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-driver}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Cache / Filas ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: driver_redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly", "no",
        "--maxmemory", "256mb",
        "--maxmemory-policy", "noeviction"
      ]
    volumes:
      - redis_data:/data
    networks:
      - driver_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Migrations (roda e sai) ─────────────────────────────────────────────────
  migrations:
    image: ghcr.io/samuelfontess/projeto-driver-backend:latest
    container_name: driver_migrations
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-driver}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-driver}
    networks:
      - driver_net
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/samuelfontess/projeto-driver-backend:latest
    container_name: driver_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-driver}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-driver}
      REDIS_URL: redis://redis:6379
      REDIS_CONNECT_TIMEOUT_MS: 300
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_JWT_SECRET: ${REFRESH_JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      UPLOAD_DIR: /app/uploads
      UPLOAD_MAX_FILE_SIZE_MB: ${UPLOAD_MAX_FILE_SIZE_MB:-10}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-900000}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-20}
      UPLOAD_RATE_LIMIT_WINDOW_MS: ${UPLOAD_RATE_LIMIT_WINDOW_MS:-60000}
      UPLOAD_RATE_LIMIT_MAX: ${UPLOAD_RATE_LIMIT_MAX:-15}
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_FROM: ${BREVO_FROM}
      BREVO_FROM_NAME: ${BREVO_FROM_NAME:-Driver App}
      EMAIL_QUEUE_KEY: ${EMAIL_QUEUE_KEY:-driver:email:events}
      PASSWORD_RESET_TOKEN_TTL_MINUTES: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:-30}
      GOOGLE_APPLICATION_CREDENTIALS: /app/serviceAccountKey.json
      FILE_PREVIEW_CACHE_TTL_SECONDS: ${FILE_PREVIEW_CACHE_TTL_SECONDS:-3600}
      FILE_PREVIEW_CACHE_MAX_BYTES: ${FILE_PREVIEW_CACHE_MAX_BYTES:-20971520}
      FILE_PREVIEW_MAX_BYTES: ${FILE_PREVIEW_MAX_BYTES:-52428800}
      DOCS_USER: ${DOCS_USER:-admin}
      DOCS_PASSWORD: ${DOCS_PASSWORD}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
    volumes:
      - uploads_data:/app/uploads
      - ./serviceAccountKey.json:/app/serviceAccountKey.json:ro
    ports:
      - "8080:8080"
    networks:
      - driver_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  # ─── Email Worker ───────────────────────────────────────────────────────────
  email-worker:
    image: ghcr.io/samuelfontess/email-worker:latest
    container_name: driver_email_worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      REDIS_URL: redis://redis:6379
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-brevo}
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_FROM: ${BREVO_FROM}
      BREVO_FROM_NAME: ${BREVO_FROM_NAME:-Driver App}
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_API_KEY: ${EMAIL_WORKER_ADMIN_API_KEY}
    networks:
      - driver_net
    depends_on:
      redis:
        condition: service_healthy

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/samuelfontess/projeto-driver-frontend:latest
    container_name: driver_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - driver_net
    depends_on:
      - backend

  # ─── Watchtower ─────────────────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_CLEANUP: "true"
      REPO_USER: samuelfontess
      REPO_PASS: ${GITHUB_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - driver_net

networks:
  driver_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
